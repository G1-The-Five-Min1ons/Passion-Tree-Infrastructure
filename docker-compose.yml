version: "3.9"

services:
  # PostgreSQL disabled - using Azure SQL instead
  # db:
  #   deploy:
  #     replicas: 0

  # Cache for semantic similarity
  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend (Gatekeeper)
  backend-go:
    environment:
      PORT: ${BACKEND_PORT:-8080}
      AZURESQL_SERVER: ${AZURESQL_SERVER}
      AZURESQL_PORT: ${AZURESQL_PORT}
      AZURESQL_USER: ${AZURESQL_USER}
      AZURESQL_PASSWORD: ${AZURESQL_PASSWORD}
      AZURESQL_DATABASE: ${AZURESQL_DATABASE}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-fastapi:8000}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    depends_on:
      ai-fastapi:
        condition: service_started

  # FastAPI (AI Logic)
  ai-fastapi:
    environment:
      PORT: ${AI_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "${AI_PORT:-8000}:${AI_PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy

volumes: {}
