version: "3.9"

name: passion-tree-infra

services:
  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-go:
    environment:
      PORT: ${BACKEND_PORT:-8080}
      AZURESQL_SERVER: ${AZURESQL_SERVER}
      AZURESQL_PORT: ${AZURESQL_PORT}
      AZURESQL_USER: ${AZURESQL_USER}
      AZURESQL_PASSWORD: ${AZURESQL_PASSWORD}
      AZURESQL_DATABASE: ${AZURESQL_DATABASE}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-fastapi:8000}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      CONTAINER_LEARNING_PATH: ${CONTAINER_LEARNING_PATH}
      CONTAINER_PROFILE: ${CONTAINER_PROFILE}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    depends_on:
      ai-fastapi:
        condition: service_started

  ai-fastapi:
    environment:
      PORT: ${AI_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL} 
      GROQ_API_KEY: ${GROQ_API_KEY}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    ports:
      - "${AI_PORT:-8000}:${AI_PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy