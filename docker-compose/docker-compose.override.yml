services:
  backend-go:
    build:
      context: ../../Passion-Tree-Backend
      dockerfile: Dockerfile.dev
    volumes:
      - ../../Passion-Tree-Backend:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["air", "-c", ".air.toml"]

  ai-fastapi:
    build:
      context: ../../Passion-Tree-AI
      dockerfile: Dockerfile.dev
    volumes:
      - ../../Passion-Tree-AI:/app
      - pip-cache:/root/.cache/pip
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${AI_PORT:-8000}", "--reload"]

volumes:
  go-mod-cache:
  go-build-cache:
  pip-cache: