name: Terraform Plan & Apply

on:
  push:
    branches: ["main"]
    paths: ["terraform/**"]       # รันเฉพาะเมื่อแก้ไฟล์ Terraform
  pull_request:
    branches: ["main"]
    paths: ["terraform/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write            # เพื่อ comment ผล plan ใน PR

env:
  TF_WORKING_DIR: terraform
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # Step 0: สร้าง Storage Account สำหรับ Terraform State (ถ้ายังไม่มี)
  setup-backend:
    name: Setup Terraform Backend
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Storage Account for TF State (if not exists)
        run: |
          # สร้าง Storage Account (ถ้ายังไม่มี)
          if ! az storage account show --name passiontreestate --resource-group Passion-Tree &>/dev/null; then
            echo "Creating storage account for Terraform state..."
            az storage account create \
              --name passiontreestate \
              --resource-group Passion-Tree \
              --location southeastasia \
              --sku Standard_LRS \
              --min-tls-version TLS1_2
          fi

          # สร้าง Blob Container (ถ้ายังไม่มี)
          if ! az storage container show --name tfstate --account-name passiontreestate &>/dev/null; then
            echo "Creating blob container for state file..."
            az storage container create \
              --name tfstate \
              --account-name passiontreestate
          fi

      - name: Cleanup stale resources (if location mismatch)
        run: |
          # ลบ resource เก่าที่อยู่ผิด region (ป้องกัน name conflict + location mismatch)
          EXPECTED_LOCATION="eastasia"
          RG="Passion-Tree"

          # ตรวจสอบว่ามี ACA Environment อยู่ผิด region หรือไม่
          ENV_ID=$(az resource list -g $RG --resource-type "Microsoft.App/managedEnvironments" --name "passion-tree-environment" --query "[0].id" -o tsv 2>/dev/null)
          if [ -n "$ENV_ID" ]; then
            ENV_LOCATION=$(az resource show --ids "$ENV_ID" --query "location" -o tsv 2>/dev/null)
            if [ "$ENV_LOCATION" != "$EXPECTED_LOCATION" ]; then
              echo "ACA Environment is in $ENV_LOCATION, expected $EXPECTED_LOCATION. Cleaning up..."

              # ลำดับสำคัญ: ลบ Container Apps ก่อน → Environment → VNet/NSG
              echo "Step 1: Deleting Container Apps..."
              az containerapp delete --name backend-go -g $RG --yes 2>/dev/null || true
              az containerapp delete --name passion-tree-ai-service -g $RG --yes 2>/dev/null || true

              echo "Step 2: Waiting for apps to be deleted..."
              sleep 30

              echo "Step 3: Deleting ACA Environment..."
              az containerapp env delete --name passion-tree-environment -g $RG --yes 2>/dev/null || true
              sleep 30

              echo "Step 4: Deleting remaining resources..."
              for name in "aca-nsg" "passiontree-vnet" "passion-tree-aca-identity" "passiontree-log-workspace"; do
                RES_ID=$(az resource list -g $RG --name "$name" --query "[0].id" -o tsv 2>/dev/null)
                if [ -n "$RES_ID" ]; then
                  echo "  Deleting: $name"
                  az resource delete --ids "$RES_ID" 2>/dev/null || true
                fi
              done

              echo "Cleanup complete."

              # ลบ Terraform state เก่า เพราะ resource ที่อ้างอิงถูกลบแล้ว
              echo "Step 5: Clearing Terraform remote state..."
              az storage blob delete \
                --container-name tfstate \
                --name terraform.tfstate \
                --account-name passiontreestate \
                --auth-mode login 2>/dev/null || true
              echo "State cleared. Terraform will create fresh resources."
            else
              echo "ACA Environment already in $EXPECTED_LOCATION, no cleanup needed."
            fi
          else
            echo "No ACA Environment found, skipping cleanup."
          fi

  # Step 1: Plan — รันทุก push & PR
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: setup-backend
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_acr_server: ${{ secrets.TF_VAR_ACR_SERVER }}
          TF_VAR_backend_image: ${{ secrets.TF_VAR_BACKEND_IMAGE }}
          TF_VAR_ai_image: ${{ secrets.TF_VAR_AI_IMAGE }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Comment ผล plan ใน PR ให้ทีมรีวิวก่อน apply
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # Step 2: Apply — รันเฉพาะ push เข้า main
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_acr_server: ${{ secrets.TF_VAR_ACR_SERVER }}
          TF_VAR_backend_image: ${{ secrets.TF_VAR_BACKEND_IMAGE }}
          TF_VAR_ai_image: ${{ secrets.TF_VAR_AI_IMAGE }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
