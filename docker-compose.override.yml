services:
  backend-go:
    build:
      context: ../Passion-Tree-Backend
      dockerfile: Dockerfile.dev
    environment:
      PORT: ${BACKEND_PORT:-8080}
      AZURESQL_SERVER: ${AZURESQL_SERVER}
      AZURESQL_PORT: ${AZURESQL_PORT}
      AZURESQL_USER: ${AZURESQL_USER}
      AZURESQL_PASSWORD: ${AZURESQL_PASSWORD}
      AZURESQL_DATABASE: ${AZURESQL_DATABASE}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-fastapi:8000}
    volumes:
      - ../Passion-Tree-Backend:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["air", "-c", ".air.toml"]
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"

  ai-fastapi:
    build:
      context: ../Passion-Tree-AI
      dockerfile: Dockerfile.dev
    environment:
      PORT: ${AI_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ../Passion-Tree-AI:/app
      - pip-cache:/root/.cache/pip
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${AI_PORT:-8000}", "--reload"]
    ports:
      - "${AI_PORT:-8000}:${AI_PORT:-8000}"
    depends_on:
      - redis

volumes:
  go-mod-cache:
  go-build-cache:
  pip-cache: