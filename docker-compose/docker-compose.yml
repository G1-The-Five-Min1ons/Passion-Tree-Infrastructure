version: "3.9"

name: passion-tree-infra

services:
  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage 
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-go:
    environment:
      PORT: ${BACKEND_PORT:-8080}
      AZURESQL_SERVER: ${AZURESQL_SERVER}
      AZURESQL_PORT: ${AZURESQL_PORT}
      AZURESQL_USER: ${AZURESQL_USER}
      AZURESQL_PASSWORD: ${AZURESQL_PASSWORD}
      AZURESQL_DATABASE: ${AZURESQL_DATABASE}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-fastapi:8000}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    depends_on:
      ai-fastapi:
        condition: service_started

  ai-fastapi:
    environment:
      PORT: ${AI_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333} 
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "${AI_PORT:-8000}:${AI_PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy 

volumes:
  qdrant-data: