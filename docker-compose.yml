services:
  # ฐานข้อมูลสำหรับเก็บพฤติกรรมผู้ใช้และข้อมูลหลัก
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: project_db
    ports:
      - "5432:5432"

  # ระบบ Cache สำหรับเก็บ Semantic Similarity
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Go Backend (Gatekeeper)
  backend-go:
    build: ./backend-go
    environment:
      DB_URL: postgres://user:password@db:5432/project_db
      AI_SERVICE_URL: http://ai-fastapi:8000
    ports:
      - "8080:8080"
    depends_on:
      - db

  # FastAPI (AI Logic)
  ai-fastapi:
    build: ./ai-service-fastapi
    environment:
      REDIS_URL: redis://redis:6379
      DB_URL: postgres://user:password@db:5432/project_db
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - redis
      - db