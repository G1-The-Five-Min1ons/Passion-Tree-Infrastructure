services:  
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage # บน Azure ACA ต้อง Mount เข้ากับ Azure Files
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend-go:
    build:
      context: ../../Passion-Tree-Backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      AZURESQL_SERVER: ${AZURESQL_SERVER}
      AI_SERVICE_URL: http://ai-fastapi:8000
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      CONTAINER_LEARNING_PATH: ${CONTAINER_LEARNING_PATH}
      CONTAINER_PROFILE: ${CONTAINER_PROFILE}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      ai-fastapi:
        condition: service_healthy

  ai-fastapi:
    build:
      context: ../../Passion-Tree-AI
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      GROQ_API_KEY: ${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  qdrant-data: # ต้องตั้งค่าให้เป็นภายนอก (External) ถ้าใช้ Azure Files